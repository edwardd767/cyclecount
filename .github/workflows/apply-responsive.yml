name: Apply responsive layout

on:
  push:
    branches: [main]
    paths:
      - 'responsive.css'
      - 'responsive.js'
      - 'scripts/apply-responsive.mjs'
      - '.github/workflows/apply-responsive.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Inject responsive assets
        run: node scripts/apply-responsive.mjs
      - name: Commit updated HTML files
        run: |
          if git diff --quiet; then
            echo "No HTML updates required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '*.html'
          git commit -m "Apply shared responsive layout to all screens"
          git push
