<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="AccountX Cycle Count prototype" />
  <title>HotelX | Account Management</title>
  <style>
    :root { --home-scale: 1; }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #f4f4f4;
    }
    #homeFrame {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: #fff;
      transform: none;
      transform-origin: top left;
    }
  </style>
  <link rel="stylesheet" href="responsive.css?v=20260717">
</head>
<body>
  <iframe id="homeFrame" src="home.html" title="HotelX Account Management Home"></iframe>
  <script>
    const frame = document.getElementById('homeFrame');

    frame.addEventListener('load', () => {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const hiddenModules = new Set([
          'Cash Book',
          'Account Receivable',
          'Fixed Assets'
        ]);

        doc.querySelectorAll('.module-card').forEach(card => {
          const moduleName = (card.dataset.module || '').trim();
          if (hiddenModules.has(moduleName)) {
            card.remove();
          }
        });

        const inventoryCard = [...doc.querySelectorAll('.module-card')]
          .find(card => card.dataset.module === 'Inventory Control');

        if (inventoryCard) {
          inventoryCard.setAttribute('aria-label', 'Open Inventory Control');
          inventoryCard.addEventListener('click', event => {
            event.preventDefault();
            event.stopImmediatePropagation();
            window.location.href = 'inventory-control.html';
          }, true);
        }
      } catch (error) {
        console.error('Unable to prepare Account Management home page.', error);
      }
    });
  </script>
  <script src="responsive.js?v=20260717"></script>
</body>
</html>
